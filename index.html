<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronos Biológica: El Conocimiento Infinito</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-bio: #050a0a;
    --cell-glow: #00f2ff;
    --life-green: #4ade80;
    --dna-purple: #a855f7;
    --text-silver: #e2e8f0;
    --border-dim: #1e293b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep-bio);
    font-family: 'Inter', sans-serif;
    color: var(--text-silver);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* Fondo animado de partículas (simulando caldo primigenio) */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 50% 50%, #00f2ff0a 0%, transparent 70%),
      url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='1' fill='%234ade80' fill-opacity='0.1'/%3E%3C/svg%3E");
    z-index: 0;
    pointer-events: none;
  }

  #deck { position: relative; width: 100vw; height: 100vh; z-index: 1; }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 8vw;
    opacity: 0;
    transform: translateX(50px);
    transition: all .8s cubic-bezier(.16, 1, .3, 1);
    pointer-events: none;
  }

  .slide.active { opacity: 1; transform: translateX(0); pointer-events: all; }
  .slide.exit { opacity: 0; transform: translateX(-50px); }

  /* --- Estilo de Portada --- */
  .cover {
    background: radial-gradient(circle at center, #0a1f1f 0%, #050a0a 100%);
    text-align: center;
  }

  .cover h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 5.5rem);
    background: linear-gradient(to right, var(--life-green), var(--cell-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }

  .cover .subtitle {
    font-family: 'Fira Code', monospace;
    color: var(--cell-glow);
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.4em;
    opacity: 0.8;
  }

  /* --- Estilo de Contenido --- */
  .content-card {
    max-width: 1100px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 3rem;
    align-items: center;
  }

  .meta-panel {
    border-left: 1px solid var(--life-green);
    padding-left: 1.5rem;
  }

  .chapter-num {
    font-family: 'Fira Code', monospace;
    color: var(--life-green);
    font-size: 0.8rem;
    margin-bottom: 0.5rem;
  }

  h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4vw, 3.5rem);
    margin-bottom: 1.5rem;
    line-height: 1;
    color: #fff;
  }

  .description {
    font-size: 1.1rem;
    line-height: 1.7;
    color: #94a3b8;
    margin-bottom: 2rem;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .data-point {
    background: #ffffff03;
    border: 1px solid var(--border-dim);
    padding: 1rem;
    border-radius: 4px;
  }

  .data-point label {
    display: block;
    font-size: 0.65rem;
    text-transform: uppercase;
    color: var(--cell-glow);
    margin-bottom: 0.5rem;
    letter-spacing: 0.1em;
  }

  .data-point p { font-size: 0.9rem; color: #cbd5e1; }

  /* --- Navegación --- */
  #nav-bar {
    position: fixed;
    bottom: 2rem;
    right: 3rem;
    display: flex;
    gap: 1rem;
    z-index: 100;
  }

  .nav-btn {
    background: transparent;
    border: 1px solid var(--border-dim);
    color: #fff;
    padding: 1rem;
    cursor: pointer;
    border-radius: 50%;
    transition: all 0.3s;
  }

  .nav-btn:hover { border-color: var(--cell-glow); background: #00f2ff11; }

  .progress-line {
    position: fixed;
    top: 0; left: 0; height: 2px;
    background: var(--cell-glow);
    box-shadow: 0 0 15px var(--cell-glow);
    transition: width 0.4s;
    z-index: 1000;
  }

  @media (max-width: 900px) {
    .content-card { grid-template-columns: 1fr; gap: 1rem; }
    .slide { justify-content: flex-start; padding-top: 5rem; overflow-y: auto; }
  }
</style>
</head>
<body>

<div class="progress-line" id="progress"></div>

<div id="deck"></div>

<div id="nav-bar">
  <button class="nav-btn" onclick="changeSlide(-1)">↑</button>
  <button class="nav-btn" onclick="changeSlide(1)">↓</button>
</div>

<script>
const LIFE_DATA = [
  {
    chapter: "01. ORIGEN",
    title: "Abiogénesis Primordial",
    desc: "Hace 4,000 millones de años, la química se convirtió en biología. En fumarolas hidrotermales o charcos volcánicos, las moléculas orgánicas simples se auto-organizaron bajo gradientes de energía extremos.",
    data: [
      { l: "Catalizador", p: "ARN Autorreplicante" },
      { l: "Entorno", p: "Océanos Hadeanos" },
      { l: "Hito", p: "La primera membrana lipídica" },
      { l: "Teoría", p: "Mundo de Hierro-Sulfuro" }
    ]
  },
  {
    chapter: "02. LUCA",
    title: "El Ancestro Universal",
    desc: "Last Universal Common Ancestor. No fue el primer ser vivo, sino el superviviente del cual todos descendemos. Un organismo unicelular que ya poseía el código genético universal y ribosomas.",
    data: [
      { l: "Genoma", p: "ADN Circular" },
      { l: "Metabolismo", p: "Fijación de CO2" },
      { l: "Ubicación", p: "Respiraderos térmicos" },
      { l: "Legado", p: "ATP Sintetasa" }
    ]
  },
  {
    chapter: "03. REVOLUCIÓN",
    title: "La Gran Oxidación",
    desc: "Las cianobacterias inventaron la fotosíntesis oxigénica, cambiando la atmósfera para siempre. Lo que fue un veneno para muchos, permitió la explosión de la vida compleja mediante la respiración aeróbica.",
    data: [
      { l: "Evento", p: "Catástrofe del Oxígeno" },
      { l: "Consecuencia", p: "Capa de Ozono" },
      { l: "Era", p: "Paleoproterozoico" },
      { l: "Subproducto", p: "Formaciones de hierro bandeado" }
    ]
  },
  {
    chapter: "04. SIMBIOSIS",
    title: "El Salto Eucariota",
    desc: "La teoría endosimbiótica de Lynn Margulis explica cómo una célula 'se comió' a otra sin digerirla, creando las mitocondrias y cloroplastos. El nacimiento del diseño celular moderno.",
    data: [
      { l: "Mecanismo", p: "Fagocitosis" },
      { l: "Resultado", p: "Organelos con ADN propio" },
      { l: "Complejidad", p: "Núcleo definido" },
      { l: "Ventaja", p: "Eficiencia energética 15x" }
    ]
  },
  {
    chapter: "05. EXPLOSIÓN",
    title: "Radiación del Cámbrico",
    desc: "En un abrir y cerrar de ojos geológico (541 Ma), aparecieron casi todos los planes corporales básicos de los animales modernos. El nacimiento de los ojos, las conchas y la depredación.",
    data: [
      { l: "Fauna", p: "Burgess Shale" },
      { l: "Innovación", p: "Esqueletos mineralizados" },
      { l: "Depredador Apex", p: "Anomalocaris" },
      { l: "Causa", p: "Aumento crítico de O2" }
    ]
  },
  {
    chapter: "06. CONSCIENCIA",
    title: "Redes Neuronales",
    desc: "Desde los ganglios simples hasta el cerebro humano. La materia orgánica comenzó a procesar información, permitiendo no solo reaccionar al entorno, sino modelarlo y recordarlo.",
    data: [
      { l: "Estructura", p: "Sinapsis electroquímica" },
      { l: "Evolución", p: "Encefalización creciente" },
      { l: "Capacidad", p: "Abstracción y Lenguaje" },
      { l: "Futuro", p: "Integración Biotecnológica" }
    ]
  }
];

let current = 0;

function init() {
  const deck = document.getElementById('deck');
  
  // Portada
  deck.innerHTML = `
    <div class="slide cover active">
      <div class="subtitle">Archivo Biológico 00</div>
      <h1>Códice de la<br>Vida Infinita</h1>
      <p style="color: #64748b; font-size: 1.2rem;">Documentando 4 mil millones de años de evolución celular</p>
    </div>
  `;

  // Slides de contenido
  LIFE_DATA.forEach(item => {
    deck.innerHTML += `
      <div class="slide">
        <div class="content-card">
          <div class="meta-panel">
            <div class="chapter-num">${item.chapter}</div>
            <h2>${item.title}</h2>
            <div class="info-grid">
              ${item.data.map(d => `
                <div class="data-point">
                  <label>${d.l}</label>
                  <p>${d.p}</p>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="text-panel">
            <p class="description">${item.desc}</p>
            <div style="height: 1px; background: linear-gradient(to right, var(--cell-glow), transparent); margin-top: 2rem;"></div>
          </div>
        </div>
      </div>
    `;
  });
  updateProgress();
}

function changeSlide(dir) {
  const slides = document.querySelectorAll('.slide');
  slides[current].classList.remove('active');
  slides[current].classList.add('exit');
  
  setTimeout(() => {
    slides[current].classList.remove('exit');
    current = (current + dir + slides.length) % slides.length;
    slides[current].classList.add('active');
    updateProgress();
  }, 100);
}

function updateProgress() {
  const total = LIFE_DATA.length + 1;
  document.getElementById('progress').style.width = `${((current + 1) / total) * 100}%`;
}

document.addEventListener('keydown', (e) => {
  if (e.key === "ArrowDown" || e.key === "ArrowRight") changeSlide(1);
  if (e.key === "ArrowUp" || e.key === "ArrowLeft") changeSlide(-1);
});

init();
</script>
</body>
</html>
